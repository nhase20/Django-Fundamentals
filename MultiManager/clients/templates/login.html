{% extends 'home.html' %}

{% block content %}
<h1>Welcome Financial Manager</h1>
<p>Let's get started</p>

    <div class="card">
        <h3>Client Information</h3>
        <p>A simple predictor process which identifies the portfolio tailored to your client</p>
        <a href="/onboarding/" class="btn">Get Started</a>
    </div>


<div class="login">

    <form method="POST">
        {% csrf_token %}
        
        <input type="text" name="username" placeholder="Username">
        <input type="password" name="password" placeholder="Password">
    
        <button type="submit">Login</button>
    </form>
    
    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

</div>
{% endblock %}
