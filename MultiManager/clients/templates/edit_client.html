{% extends 'home.html' %}

{% block content %}
<style>
    .edit-wrapper {
        max-width: 700px;
        margin: 40px auto;
    }

    .edit-header .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: #2ec4b6;
        margin-bottom: 6px;
    }

    .edit-header h1 {
        font-size: 26px;
        font-weight: 800;
        color: #1a1a1a;
        margin: 0 0 4px;
    }

    .edit-header p {
        color: #64748b;
        font-size: 14px;
        margin: 0 0 32px;
    }

    .edit-card {
        background: #fff;
        border-radius: 16px;
        padding: 32px 36px;
        box-shadow: 0 2px 20px rgba(0, 0, 0, .07);
        margin-bottom: 24px;
    }

    .edit-card h3 {
        font-size: 14px;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 20px;
        padding-bottom: 12px;
        border-bottom: 2px solid #f1f5f9;
    }

    .field-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
    }

    @media (max-width: 560px) {
        .field-grid {
            grid-template-columns: 1fr;
        }
    }

    .field-full {
        grid-column: 1 / -1;
    }

    .field-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .field-group label {
        font-size: 12px;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: .06em;
    }

    .field-group input,
    .field-group select {
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        color: #1a1a1a;
        outline: none;
        transition: border-color .2s;
        width: 100%;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    .field-group input:focus,
    .field-group select:focus {
        border-color: #2ec4b6;
    }

    .action-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 8px;
    }

    .btn-save {
        background: #1a1a1a;
        color: #fff;
        border: none;
        padding: 13px 32px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: background .2s;
        font-family: 'Inter', sans-serif;
    }

    .btn-save:hover {
        background: #2ec4b6;
    }

    .btn-cancel {
        background: transparent;
        border: 2px solid #e2e8f0;
        color: #475569;
        padding: 11px 24px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        display: inline-block;
    }

    .btn-cancel:hover {
        border-color: #94a3b8;
    }
</style>

<div class="edit-wrapper">
    <div class="edit-header">
        <div class="eyebrow">Edit Client</div>
        <h1>{{ client.name }}</h1>
        <p>Update the client's information below. All changes are saved immediately.</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="edit-card">
            <h3>Personal Details</h3>
            <div class="field-grid">
                <div class="field-group field-full">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" value="{{ client.name }}" required>
                </div>
                <div class="field-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" value="{{ client.age }}" min="18" max="120" required>
                </div>
                <div class="field-group">
                    <label for="investment_goal">Investment Goal</label>
                    <select id="investment_goal" name="investment_goal">
                        <option value="retirement" {% if client.investment_goal == 'retirement' %}selected{% endif %}>
                            Retirement planning</option>
                        <option value="education" {% if client.investment_goal == 'education' %}selected{% endif %}>
                            Education / specific goal</option>
                        <option value="wealth" {% if client.investment_goal == 'wealth' %}selected{% endif %}>Long-term
                            wealth building</option>
                    </select>
                </div>
                <div class="field-group">
                    <label for="time_horizon">Time Horizon (years)</label>
                    <input type="number" id="time_horizon" name="time_horizon" value="{{ client.time_horizon }}" min="1"
                        max="50" required>
                </div>
            </div>
        </div>

        <div class="edit-card">
            <h3>Risk &amp; Classification</h3>
            <div class="field-grid">
                <div class="field-group">
                    <label for="risk_profile">Risk Profile</label>
                    <select id="risk_profile" name="risk_profile">
                        {% for val, label in risk_profile_choices %}
                        <option value="{{ val }}" {% if client.risk_profile == val %}selected{% endif %}>{{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field-group">
                    <label for="risk_rating">Risk Rating</label>
                    <select id="risk_rating" name="risk_rating">
                        {% for val, label in risk_rating_choices %}
                        <option value="{{ val }}" {% if client.risk_rating == val %}selected{% endif %}>{{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field-group field-full">
                    <label for="risk_tolerance">ASISA Category (Risk Tolerance)</label>
                    <select id="risk_tolerance" name="risk_tolerance">
                        {% for val, label in risk_tolerance_choices %}
                        <option value="{{ val }}" {% if client.risk_tolerance == val %}selected{% endif %}>{{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field-group field-full">
                    <label for="client_group">Client Group</label>
                    <select id="client_group" name="client_group">
                        {% for val, label in group_choices %}
                        <option value="{{ val }}" {% if client.client_group == val %}selected{% endif %}>{{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="action-row">
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="{% url 'client_detail' client.id %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
